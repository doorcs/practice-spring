<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="container">
    <div>
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>이름</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="member : ${members}"> <!-- 모델 안에 있는 값(멤버)을 꺼내는것 -->
                <td th:text="${member.id}"></td>
                <td th:text="${member.name}"></td> <!-- getId(), getName() 호출해서 값을 꺼냄 -->
            </tr>
            </tbody>
        </table>
    </div>
</div> <!-- /container -->
</body>
</html>
